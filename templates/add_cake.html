{% extends "base.html" %}

{% block title %}Add New Cake{% endblock %}

{% block content %}
<style>
    h2 {
        color: var(--dark-pink);
        font-family: 'Playfair Display', serif;
    }
    .btn-primary {
        background-color: var(--dark-pink);
        border-color: var(--dark-pink);
    }
    .btn-primary:hover {
        background-color: var(--button-hover-pink);
        border-color: var(--button-hover-pink);
    }
</style>
<h2 class="mb-4">Add New Cake</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('add_cake') }}" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="name" class="form-label">Cake Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" class="form-control" id="price" name="price" step="0.01" required>
            </div>
            <div class="mb-3">
                <label for="stock" class="form-label">Stock</label>
                <input type="number" class="form-control" id="stock" name="stock" required>
            </div>
            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" class="form-control" id="category" name="category">
            </div>
            <div class="mb-3">
                <label for="image_file" class="form-label">Cake Image</label>
                <input type="file" class="form-control" id="image_file" name="image_file" accept="image/*">
                <div class="form-text">Accepted formats: JPG, PNG, GIF.</div>
            </div>
            <div class="mb-3">
                <label for="popularity" class="form-label">Popularity (e.g., 1-100)</label>
                <input type="number" class="form-control" id="popularity" name="popularity" min="0" max="100" value="50">
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="available" name="available" value="true" checked>
                <label class="form-check-label" for="available">Available for Sale</label>
            </div>
            <button type="submit" class="btn btn-primary">Add Cake</button>
            <a href="{{ url_for('manage_cakes') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
