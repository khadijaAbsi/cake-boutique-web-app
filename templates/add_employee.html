{% extends "base.html" %}

{% block title %}Add Employee{% endblock %}

{% block content %}
<style>
    .card-header {
        background-color: var(--dark-pink) !important; /* Specific pink for header */
        color: var(--light-text-color) !important;
        font-family: 'Playfair Display', serif;
    }
    .btn-primary {
        background-color: var(--dark-pink);
        border-color: var(--dark-pink);
    }
    .btn-primary:hover {
        background-color: var(--button-hover-pink);
        border-color: var(--button-hover-pink);
    }
</style>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                Add New Employee
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('add_employee') }}">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="position" class="form-label">Position</label>
                            <input type="text" class="form-control" id="position" name="position" required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check mt-4 pt-2">
                                <input class="form-check-input" type="checkbox" id="is_manager" name="is_manager">
                                <label class="form-check-label" for="is_manager">
                                    Manager Account
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Add Employee</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
