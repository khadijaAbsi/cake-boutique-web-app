{% extends "base.html" %}
{% block title %}Add New Ingredient{% endblock %}
{% block content %}
<style>
    h2 {
        color: var(--dark-pink);
        font-family: 'Playfair Display', serif;
    }
    .btn-primary {
        background-color: var(--dark-pink);
        border-color: var(--dark-pink);
    }
    .btn-primary:hover {
        background-color: var(--button-hover-pink);
        border-color: var(--button-hover-pink);
    }
</style>
<h2>Add New Ingredient</h2>
<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Unit</label>
        <input type="text" name="unit" class="form-control" placeholder="e.g. grams, ml, pcs">
    </div>
    <div class="mb-3">
        <label>Initial Stock</label>
        <input type="number" name="stock_level" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Ingredient</button>
</form>
{% endblock %}
